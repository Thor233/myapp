<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI塔罗深度解析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7c6ff7;
      --primary-dark: #2d2060;
      --accent: #a855f7;
      --bg: #0f0e17;
      --card-bg: #1a1a2e;
      --border: #2a2a4a;
      --text: #fffffe;
      --text-dim: #a7a9be;
      --error: #ff6b6b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 2rem 0 2.5rem;
    }
    .header .symbol {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 0 10px rgba(124, 111, 247, 0.5));
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .header p {
      font-size: 0.875rem;
      color: var(--text-dim);
    }

    /* 通用动画 */
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 表单卡片 */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: all 0.2s;
      font-family: inherit;
    }
    /* 针对日期输入框的暗色模式优化 */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(124, 111, 247, 0.2);
    }
    select option { background: var(--card-bg); }
    textarea { resize: none; }

    /* 主题按钮 */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 6px;
    }
    .topic-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      padding: 10px 4px;
      text-align: center;
      transition: all 0.2s;
      font-family: inherit;
    }
    .topic-btn:hover { border-color: var(--primary); color: var(--text); }
    .topic-btn.active {
      background: var(--primary-dark);
      border-color: var(--primary);
      color: var(--text);
      font-weight: 500;
    }

    /* 提交按钮 */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-top: 1rem;
      transition: all 0.2s;
      font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 塔罗牌抽卡区 */
    #card-selection-view {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }
    .card-ritual-title {
      margin-bottom: 2.5rem;
      color: var(--text-dim);
      font-size: 14px;
      letter-spacing: 0.1em;
    }
    .tarot-deck {
      display: flex;
      justify-content: center;
      gap: 12px;
      perspective: 1000px;
      margin-bottom: 3rem;
      min-height: 180px;
      flex-wrap: wrap;
    }

    /* 卡牌 3D 翻转样式 */
    .tarot-card-container {
      width: 90px;
      height: 150px;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tarot-card-container.flipped {
      transform: rotateY(180deg);
      cursor: default;
    }
    .tarot-card-container.selected-anim {
      transform: rotateY(180deg) translateY(-20px) scale(1.1);
      z-index: 100;
    }
    .tarot-card-front, .tarot-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }
    .tarot-card-back {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2060 100%);
      border: 1px solid var(--primary);
    }
    .tarot-card-back::before {
      content: '❈';
      font-size: 20px;
      color: var(--primary);
      opacity: 0.4;
    }
    .tarot-card-front {
      background: #fffffe;
      color: #0f0e17;
      transform: rotateY(180deg);
      padding: 10px;
      text-align: center;
      border: 2px solid var(--primary);
    }
    .tarot-card-front .card-name {
      font-size: 13px;
      font-weight: 800;
      writing-mode: vertical-rl;
      letter-spacing: 0.2em;
    }
    .tarot-card-front .card-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .tarot-card-container:hover:not(.flipped) {
      transform: translateY(-10px);
    }

    /* 抽卡仪式动画 */
    .shuffle-anim {
      animation: shuffle 0.6s ease-in-out;
    }
    @keyframes shuffle {
      0% { transform: scale(1); }
      50% { transform: scale(0.9) rotate(5deg); }
      100% { transform: scale(1); }
    }

    /* 加载状态 */
    #loading-view {
      display: none;
      text-align: center;
      padding: 4rem 0;
    }
    .spinner-box {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
    }
    .spinner {
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: var(--primary);
      border-bottom-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    .spinner-inner {
      position: absolute;
      top: 15px; left: 15px; right: 15px; bottom: 15px;
      border: 3px solid transparent;
      border-left-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-view p { color: var(--text-dim); font-size: 14px; letter-spacing: 0.1em; }

    /* Toast 提示 */
    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }
    .toast {
      background: rgba(26, 26, 46, 0.95);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      margin-bottom: 10px;
      animation: toastIn 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(10px);
    }
    .toast.error { border-left-color: var(--error); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 报告页 */
    #report-view { display: none; }
    .report-header { text-align: center; padding: 1.5rem 0 2rem; }
    .report-header .badge {
      display: inline-block;
      font-size: 11px;
      padding: 3px 12px;
      background: var(--primary-dark);
      border: 1px solid var(--primary);
      border-radius: 999px;
      color: #a78bfa;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .report-header h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.75rem; }
    .tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .tag {
      font-size: 12px;
      padding: 3px 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
    }
    .report-section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 12px;
    }
    .section-label { font-size: 11px; color: var(--primary); letter-spacing: 0.1em; margin-bottom: 8px; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .section-body { font-size: 14px; line-height: 1.85; color: #c4c4d4; }
    .advice-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .advice-num {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      background: var(--primary-dark);
      border-radius: 999px;
      flex-shrink: 0;
      margin-top: 3px;
      color: #a78bfa;
    }
    .lucky-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .lucky-item { background: var(--bg); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .lucky-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .lucky-val { font-size: 13px; font-weight: 500; }
    .ending-card {
      background: linear-gradient(135deg, #1a1040, var(--card-bg));
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 12px;
    }
    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      padding: 8px 20px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .reset-btn:hover { border-color: var(--primary); color: var(--text); }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .topic-grid { grid-template-columns: repeat(2, 1fr); }
      .lucky-grid { grid-template-columns: repeat(2, 1fr); }
      .tarot-deck { gap: 10px; }
      .tarot-card-container { width: 80px; height: 130px; }
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <div class="container">
    <div class="header">
      <div class="symbol">🔮</div>
      <h1>AI 塔罗深度解析</h1>
      <p>融合塔罗 · 星座 · MBTI · 命理，专属于你的深度报告</p>
    </div>

    <!-- 表单 -->
    <div id="form-view" class="fade-in">
      <div class="card">
        <div class="form-grid">
          <div class="form-group">
            <label>姓名</label>
            <input id="name" type="text" placeholder="你的名字">
          </div>
          <div class="form-group">
            <label>出生日期</label>
            <div class="birthday-input-wrapper">
              <input id="birthday" type="text" placeholder="例如：19900101">
              <span class="calendar-icon" id="calendar-icon">📅</span>
            </div>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>星座</label>
            <select id="zodiac">
              <option value="">请选择</option>
              <option>白羊座</option><option>金牛座</option><option>双子座</option>
              <option>巨蟹座</option><option>狮子座</option><option>处女座</option>
              <option>天秤座</option><option>天蝎座</option><option>射手座</option>
              <option>摩羯座</option><option>水瓶座</option><option>双鱼座</option>
            </select>
          </div>
          <div class="form-group">
            <label>MBTI（不知道可留空）</label>
            <input id="mbti" type="text" placeholder="如 INFJ、ENFP...">
          </div>
        </div>

        <div class="form-group" style="margin-top:12px;">
          <label>占卜主题</label>
          <div class="topic-grid" id="topic-group">
            <button class="topic-btn" data-val="感情运势">感情运势</button>
            <button class="topic-btn" data-val="事业发展">事业发展</button>
            <button class="topic-btn" data-val="财运分析">财运分析</button>
            <button class="topic-btn" data-val="整体运势">整体运势</button>
          </div>
        </div>

        <div class="form-group" style="margin-top:12px;">
          <label>你的困惑或问题（可选）</label>
          <textarea id="question" rows="2" placeholder="写下你最近的困惑，让解析更准确..."></textarea>
        </div>

        <button class="submit-btn" id="submit-btn">进入抽卡仪式</button>
      </div>
    </div>

    <!-- 抽卡仪式 -->
    <div id="card-selection-view" class="fade-in">
      <p class="card-ritual-title">闭上双眼，心中默念你的问题...<br>凭直觉点击一张牌开始解析</p>
      <div class="tarot-deck" id="tarot-deck">
        <!-- 动态生成卡牌 -->
      </div>
      <button id="back-btn" class="reset-btn" style="border:none; opacity: 0.6;" onclick="backToForm()">← 返回修改信息</button>
    </div>

    <!-- 加载中 -->
    <div id="loading-view" class="fade-in">
      <div class="spinner-box">
        <div class="spinner"></div>
        <div class="spinner-inner"></div>
      </div>
      <p id="loading-text">正在感应你的能量脉络...</p>
    </div>

    <!-- 报告 -->
    <div id="report-view" class="fade-in"></div>

  </div>

  <script>
    // ★ 部署时修改为你的后端地址，例如 'https://ai-tarot-app.onrender.com'
    const API_BASE = '';

    let selectedTopic = '';
    let userData = {};
    let isSelecting = false;

    // 自动计算星座
    document.getElementById('birthday').addEventListener('input', function(e) {
      const val = e.target.value.trim();
      if (!val) {
        document.getElementById('zodiac').value = '';
        return;
      }

      const date = parseDate(val);
      if (!date) {
        document.getElementById('zodiac').value = '';
        // showToast('请输入有效的日期格式 (YYYYMMDD)', 'error'); // 过于频繁，暂时取消
        return;
      }
      
      calculateAndSetZodiac(date);
    });

    // 绑定日历图标点击事件，触发原生日期选择器
    document.getElementById('calendar-icon').addEventListener('click', () => {
      const birthdayInput = document.getElementById('birthday');
      const tempDateInput = document.createElement('input');
      tempDateInput.type = 'date';
      tempDateInput.style.position = 'absolute';
      tempDateInput.style.left = '-9999px';
      tempDateInput.style.opacity = '0';

      // 如果当前输入框有值，尝试设置给临时日期选择器
      const currentVal = birthdayInput.value.trim();
      if (currentVal) {
        const parsedDate = parseDate(currentVal);
        if (parsedDate) {
          tempDateInput.value = parsedDate.toISOString().slice(0, 10);
        }
      }

      document.body.appendChild(tempDateInput);
      tempDateInput.showPicker();

      tempDateInput.addEventListener('change', () => {
        const selectedDate = new Date(tempDateInput.value);
        const year = selectedDate.getFullYear();
        const month = (selectedDate.getMonth() + 1).toString().padStart(2, '0');
        const day = selectedDate.getDate().toString().padStart(2, '0');
        const formattedDate = `${year}${month}${day}`;
        
        birthdayInput.value = formattedDate;
        calculateAndSetZodiac(selectedDate);
        tempDateInput.remove();
      });

      // 如果取消选择，也要移除临时 input
      tempDateInput.addEventListener('blur', () => {
        setTimeout(() => tempDateInput.remove(), 100); // 延时移除，确保 change 事件能触发
      });
    });

    // 日期解析函数，兼容 YYYYMMDD 和标准日期字符串
    function parseDate(dateString) {
      // 尝试 YYYYMMDD 格式
      const yyyymmddMatch = dateString.match(/^(\d{4})(\d{2})(\d{2})$/);
      if (yyyymmddMatch) {
        const year = parseInt(yyyymmddMatch[1]);
        const month = parseInt(yyyymmddMatch[2]) - 1; // 月份从0开始
        const day = parseInt(yyyymmddMatch[3]);
        const date = new Date(year, month, day);
        // 验证日期是否有效 (例如，2月30日会被Date对象自动调整)
        if (date.getFullYear() === year && date.getMonth() === month && date.getDate() === day) {
          return date;
        }
      }

      // 尝试标准日期字符串解析 (例如来自日期选择器)
      try {
        const date = new Date(dateString);
        if (!isNaN(date.getTime())) {
          return date;
        }
      } catch (e) {
        // ignore
      }
      return null;
    }

    // 计算并设置星座
    function calculateAndSetZodiac(date) {
      const month = date.getMonth() + 1;
      const day = date.getDate();
      
      const days = [19, 18, 20, 19, 20, 21, 22, 22, 22, 23, 22, 21]; // 各星座结束日期前一天
      const zodiacs = ["摩羯座", "水瓶座", "双鱼座", "白羊座", "金牛座", "双子座", "巨蟹座", "狮子座", "处女座", "天秤座", "天蝎座", "射手座", "摩羯座"];
      const result = day > days[month - 1] ? zodiacs[month] : zodiacs[month - 1];
      
      const zodiacSelect = document.getElementById('zodiac');
      if (zodiacSelect.value !== result) { // 避免重复提示
        zodiacSelect.value = result;
        showToast(`已为你自动感应星座：${result}`);
      }
    }

    const majorArcana = [
      { name: '愚者', icon: '🃏' }, { name: '魔术师', icon: '🧙' }, { name: '女教皇', icon: '📖' },
      { name: '女皇', icon: '👑' }, { name: '皇帝', icon: '⚖️' }, { name: '教皇', icon: '🙏' },
      { name: '恋人', icon: '❤️' }, { name: '战车', icon: '🚜' }, { name: '力量', icon: '🦁' },
      { name: '隐士', icon: '🕯️' }, { name: '命运之轮', icon: '🎡' }, { name: '正义', icon: '⚖️' },
      { name: '倒吊人', icon: '👣' }, { name: '死神', icon: '💀' }, { name: '节制', icon: '🍶' },
      { name: '恶魔', icon: '😈' }, { name: '高塔', icon: '⚡' }, { name: '星星', icon: '⭐' },
      { name: '月亮', icon: '🌙' }, { name: '太阳', icon: '☀️' }, { name: '审判', icon: '🎺' },
      { name: '世界', icon: '🌍' }
    ];

    // Toast 提示函数
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type === 'error' ? 'error' : ''}`;
      toast.innerHTML = `<span>${type === 'error' ? '✕' : '✧'}</span> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // 主题选择
    document.getElementById('topic-group').addEventListener('click', e => {
      const btn = e.target.closest('.topic-btn');
      if (!btn) return;
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTopic = btn.dataset.val;
    });

    // 提交表单进入仪式
    document.getElementById('submit-btn').addEventListener('click', () => {
      const name = document.getElementById('name').value.trim();
      const rawBirthday = document.getElementById('birthday').value.trim();
      const zodiac = document.getElementById('zodiac').value;
      const mbti = document.getElementById('mbti').value.trim();
      const question = document.getElementById('question').value.trim();

      if (!name) return showToast('请输入您的姓名', 'error');
      if (!zodiac) return showToast('请选择您的星座', 'error');
      if (!selectedTopic) return showToast('请选择一个占卜主题', 'error');

      let formattedBirthday = '';
      if (rawBirthday) {
        const parsedBirthday = parseDate(rawBirthday);
        if (!parsedBirthday) {
          return showToast('请输入有效的日期格式 (YYYYMMDD)', 'error');
        }
        formattedBirthday = parsedBirthday.toISOString().slice(0, 10); // Format to YYYY-MM-DD
      }
      
      userData = { name, birthday: formattedBirthday, zodiac, mbti, topic: selectedTopic, question };

      document.getElementById('form-view').style.display = 'none';
      initRitual();
    });

    function initRitual() {
      const selectionView = document.getElementById('card-selection-view');
      selectionView.style.display = 'block';
      isSelecting = false;

      const deck = document.getElementById('tarot-deck');
      deck.innerHTML = '';
      deck.classList.add('shuffle-anim');

      // 随机选5张不重复的牌
      const shuffled = [...majorArcana].sort(() => 0.5 - Math.random());
      const selectedSet = shuffled.slice(0, 5);

      selectedSet.forEach((card, i) => {
        const container = document.createElement('div');
        container.className = 'tarot-card-container';
        container.innerHTML = `
          <div class="tarot-card-back"></div>
          <div class="tarot-card-front">
            <div class="card-icon">${card.icon}</div>
            <div class="card-name">${card.name}</div>
          </div>
        `;
        container.onclick = () => selectCard(container, card.name);
        deck.appendChild(container);
      });

      setTimeout(() => deck.classList.remove('shuffle-anim'), 600);
      showToast('请深呼吸，选择一张与你产生共鸣的牌');
    }

    function backToForm() {
      document.getElementById('card-selection-view').style.display = 'none';
      document.getElementById('form-view').style.display = 'block';
    }

    async function selectCard(el, cardName) {
      if (isSelecting) return;
      isSelecting = true;
      userData.card = cardName;

      // 视觉反馈：翻开所有牌，高亮选中的牌
      document.getElementById('back-btn').style.display = 'none';
      el.classList.add('selected-anim');
      
      const allCards = document.querySelectorAll('.tarot-card-container');
      allCards.forEach(c => {
        if (c !== el) {
          c.classList.add('flipped');
          c.style.opacity = '0.4';
          c.style.filter = 'grayscale(0.8)';
        }
      });

      showToast(`你抽中了：${cardName}`);

      setTimeout(() => {
        startAnalysis();
      }, 1800);
    }

    const loadingMessages = [
      '正在为你解读星盘...',
      '塔罗牌感应你的能量...',
      '深度分析性格脉络...',
      '正在剥开命运的迷雾...',
      '撰写专属深度报告中...',
    ];

    async function startAnalysis() {
      document.getElementById('card-selection-view').style.display = 'none';
      document.getElementById('loading-view').style.display = 'block';

      let msgIdx = 0;
      const timer = setInterval(() => {
        document.getElementById('loading-text').textContent =
          loadingMessages[++msgIdx % loadingMessages.length];
      }, 2500);

      try {
        const res = await fetch(API_BASE + '/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData),
        });

        clearInterval(timer);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || '请求失败');

        renderReport(data.report, userData.zodiac, userData.topic);

      } catch (err) {
        clearInterval(timer);
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('form-view').style.display = 'block';
        showToast('生成失败：' + err.message, 'error');
      }
    }

    function renderReport(r, zodiac, topic) {
      document.getElementById('loading-view').style.display = 'none';
      const view = document.getElementById('report-view');
      view.style.display = 'block';

      view.innerHTML = `
        <div class="report-header">
          <div class="badge">AI 深度解析报告</div>
          <h2>${r.title}</h2>
          <div class="tags">
            <span class="tag">${zodiac}</span>
            <span class="tag">${topic}</span>
          </div>
        </div>

        <div class="report-section">
          <p class="section-body">${r.summary}</p>
        </div>

        <div class="report-section">
          <p class="section-label">抽中塔罗牌</p>
          <p class="section-title">${r.tarot.card}</p>
          <p class="section-body">${r.tarot.meaning}</p>
        </div>

        <div class="report-section">
          <p class="section-label">性格与矛盾</p>
          <p class="section-body">${r.personality}</p>
        </div>

        <div class="report-section">
          <p class="section-label">${topic} · 深度解读</p>
          <p class="section-body">${r.topic_analysis}</p>
        </div>

        <div class="report-section">
          <p class="section-label">能量状态</p>
          <p class="section-body">${r.energy}</p>
        </div>

        <div class="report-section">
          <p class="section-label">行动建议</p>
          ${r.advice.map((a, i) => `
            <div class="advice-item">
              <span class="advice-num">${i + 1}</span>
              <p class="advice-text">${a}</p>
            </div>
          `).join('')}
        </div>

        <div class="report-section">
          <p class="section-label">幸运元素</p>
          <div class="lucky-grid">
            ${[['幸运色', r.lucky.color], ['幸运数字', r.lucky.number],
               ['幸运日', r.lucky.day], ['能量水晶', r.lucky.crystal]].map(([label, val]) => `
              <div class="lucky-item">
                <p class="lucky-label">${label}</p>
                <p class="lucky-val">${val}</p>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="ending-card">
          <p class="ending-text">${r.ending}</p>
          <button class="reset-btn" onclick="resetForm()">重新测算</button>
        </div>
      `;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('report-view').style.display = 'none';
      document.getElementById('form-view').style.display = 'block';
      document.getElementById('back-btn').style.display = 'inline-block';
      selectedTopic = '';
      userData = {};
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
